<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phanuelVoyage | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white shadow-sm px-6 py-4">
        <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-2xl font-bold text-sky-600">phanuelVoyage</a>
            <div class="flex flex-wrap items-center gap-3 text-sm text-slate-600">
                <a href="index.html" class="hover:text-sky-600">Accueil</a>
                <a href="destinations.html" class="hover:text-sky-600">Destinations</a>
                <a href="offres.html" class="hover:text-sky-600">Offres</a>
                <a href="register.html" class="rounded-full border border-sky-600 px-4 py-2 text-sky-600 hover:bg-sky-50">Inscription</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-4xl px-6 py-16">
        <div class="grid gap-10 lg:grid-cols-2 lg:items-center">
            <div class="space-y-6">
                <span class="inline-flex items-center gap-2 rounded-full bg-sky-100 px-4 py-1 text-sm font-semibold text-sky-700">Bienvenue</span>
                <h1 class="text-4xl font-extrabold text-slate-900">Connectez-vous à votre compte</h1>
                <p class="text-slate-600">Accédez à vos réservations, offres personalisées et informations de voyage.</p>
            </div>
            <div class="rounded-[2rem] bg-white p-8 shadow-xl shadow-slate-900/10">
                <form action="auth.php" method="post" class="space-y-5">
                    <input type="hidden" name="action" value="login">
                    <div>
                        <label class="block text-sm font-semibold text-slate-800">Email</label>
                        <input type="email" name="email" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 p-4 outline-none focus:border-sky-500" placeholder="prenom@exemple.com">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-800">Mot de passe</label>
                        <input type="password" name="password" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 p-4 outline-none focus:border-sky-500" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full rounded-full bg-sky-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-sky-600/20 hover:bg-sky-500">Se connecter</button>
                    <p class="text-center text-sm text-slate-500">Pas encore inscrit ? <a href="register.html" class="font-semibold text-sky-600 hover:text-sky-500">Créer un compte</a></p>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
